<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sampada — Your Wealth, Unified</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="wordmark">Sampada</span>
      <span class="tagline">Your wealth, unified · sampada.xyz</span>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tabgroup="auth-tabs" onclick="showTab('tab-login', this, 'auth-tabs')">Sign in</button>
      <button class="auth-tab" data-tabgroup="auth-tabs" onclick="showTab('tab-signup', this, 'auth-tabs')">Create account</button>
    </div>

    <div id="auth-msg"></div>

    <!-- LOGIN -->
    <div id="tab-login" class="tab-panel auth-tabs active">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" onclick="handleLogin()">
        Sign in →
      </button>
    </div>

    <!-- SIGNUP -->
    <div id="tab-signup" class="tab-panel auth-tabs">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" id="signup-name" class="form-input" placeholder="Vibhor Rattan"/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="signup-email" class="form-input" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="signup-password" class="form-input" placeholder="Min 8 characters"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem" onclick="handleSignup()">
        Create account →
      </button>
    </div>

    <div class="login-footer">
      संपदा · Your personal wealth OS
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="js/app.js"></script>
<script>
const SUPABASE_URL = 'https://nsnarymjxiqquhflyyyu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zbmFyeW1qeGlxcXVoZmx5eXl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDE5MzQsImV4cCI6MjA5MTIxNzkzNH0.bmK5vn0phw9t_neRUI0mmETUi7p8J-HngEbxGSipDzA';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Redirect if already logged in
db.auth.getUser().then(({ data: { user } }) => {
  if (user) window.location.href = 'dashboard.html';
});

function setMsg(msg, type = 'warn') {
  const el = document.getElementById('auth-msg');
  el.innerHTML = `<div class="alert alert-${type}" style="margin-bottom:1rem">${msg}</div>`;
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return setMsg('Please fill in all fields.');
  setMsg('Signing in…', 'warn');
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) return setMsg(error.message, 'danger');
  window.location.href = 'dashboard.html';
}

async function handleSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name || !email || !password) return setMsg('Please fill in all fields.');
  if (password.length < 8) return setMsg('Password must be at least 8 characters.');
  setMsg('Creating account…', 'warn');
  const { data, error } = await db.auth.signUp({
    email, password, options: { data: { full_name: name } }
  });
  if (error) return setMsg(error.message, 'danger');
  setMsg('Account created! Check your email to confirm, then sign in.', 'success');
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const activeTab = document.querySelector('.tab-panel.auth-tabs.active');
  if (activeTab?.id === 'tab-login') handleLogin();
  else handleSignup();
});

function showTab(tabId, btnEl, groupClass) {
  document.querySelectorAll('.tab-panel.auth-tabs').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if (btnEl) btnEl.classList.add('active');
  document.getElementById('auth-msg').innerHTML = '';
}
</script>
</body>
</html>
